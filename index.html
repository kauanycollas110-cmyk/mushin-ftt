<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>MUSHIN // FTT ELITE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta Dark Noir & Bioluminescente */
  --bg-noir: #050505;
  --bg-synapse: radial-gradient(circle at center, rgba(0, 255, 255, 0.03) 0%, transparent 70%);
  --tech-cyan: #00ffff;
  --tech-glow: rgba(0, 255, 255, 0.4);
  --gold: #D4AF37;
  --gold-glow: rgba(212, 175, 55, 0.5);
  --blood: #ff0033;
  --blood-glow: rgba(255, 0, 51, 0.6);
  --ink: #e0e0e0;
  --ink-dim: #666666;
  
  /* Neumorfismo Shadows */
  --neu-hi: rgba(255, 255, 255, 0.05);
  --neu-lo: rgba(0, 0, 0, 0.8);
  
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  background-color: var(--bg-noir);
  background-image: var(--bg-synapse);
  color: var(--ink);
  font-family: var(--font-mono);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* Background HUD Elements (Imagem 4) */
.stage-hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.3;
}

.stage-hud::before {
  content: "";
  position: absolute;
  top: 10%; left: 10%; width: 20px; height: 20px;
  border-top: 1px solid var(--ink-dim);
  border-left: 1px solid var(--ink-dim);
}

.stage-hud::after {
  content: "";
  position: absolute;
  bottom: 10%; right: 10%; width: 20px; height: 20px;
  border-bottom: 1px solid var(--ink-dim);
  border-right: 1px solid var(--ink-dim);
}

.hud-cross {
  position: absolute;
  width: 10px; height: 10px;
}
.hud-cross::before, .hud-cross::after {
  content: ""; position: absolute; background: var(--ink-dim);
}
.hud-cross::before { top: 50%; left: 0; width: 100%; height: 1px; }
.hud-cross::after { left: 50%; top: 0; width: 1px; height: 100%; }

.hud-tag {
  position: fixed;
  font-size: 8px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--ink-dim);
  z-index: 2;
  pointer-events: none;
}
.hud-tag.top { top: 20px; left: 50%; transform: translateX(-50%); }
.hud-tag.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

/* Screen Management */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 5;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.screen.active { display: flex; }

/* STATE: IDLE (Imagem 5) */
#idle .brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  letter-spacing: 0.5em;
  color: var(--gold);
  text-shadow: 0 0 15px var(--gold-glow);
  margin-bottom: 60px;
}

.neu-btn-wrap {
  position: relative;
  width: 200px; height: 200px;
  display: grid; place-items: center;
}

.neu-btn {
  width: 160px; height: 160px;
  border-radius: 50%;
  border: none;
  background: #0a0a0a;
  box-shadow: -8px -8px 20px var(--neu-hi), 10px 10px 25px var(--neu-lo);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}

.neu-btn:active {
  box-shadow: inset -4px -4px 10px var(--neu-hi), inset 6px 6px 15px var(--neu-lo);
  transform: scale(0.98);
}

.neu-btn .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--tech-cyan);
  box-shadow: 0 0 15px var(--tech-glow);
  margin-bottom: 10px;
  animation: pulse 2s infinite;
}

.neu-btn span {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink);
}

@keyframes pulse {
  0% { opacity: 0.4; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0.4; transform: scale(0.8); }
}

/* STATE: RUN (Imagem 3) */
#run { background: var(--bg-noir); }

.timer-wrap {
  text-align: center;
  margin-bottom: 40px;
}

.timer-label {
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.5em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}

.timer-display {
  font-size: 80px;
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold-glow);
  line-height: 1;
}

.counter-wrap {
  position: relative;
  padding: 40px;
}

/* Brackets estilizados (Imagem 4) */
.counter-wrap::before, .counter-wrap::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0; width: 15px;
  border: 1px solid var(--tech-cyan);
  opacity: 0.5;
}
.counter-wrap::before { left: 0; border-right: none; }
.counter-wrap::after { right: 0; border-left: none; }

.counter-display {
  font-size: 140px;
  font-weight: 700;
  color: var(--ink);
  text-shadow: 0 0 30px var(--tech-glow);
  line-height: 0.9;
}

.counter-label {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--ink-dim);
  text-transform: uppercase;
}

/* Ripple effect (Feedback visual) */
.ripple {
  position: absolute;
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--tech-glow), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: ripple-anim 0.4s ease-out forwards;
  z-index: 4;
}
@keyframes ripple-anim {
  to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
}

/* STATE: RESULT */
#result h2 {
  font-size: 12px;
  letter-spacing: 0.6em;
  color: var(--ink-dim);
  text-transform: uppercase;
  margin-bottom: 40px;
}

.final-score {
  font-size: 120px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold-glow);
  margin-bottom: 40px;
}

.restart-btn {
  background: transparent;
  border: 1px solid var(--ink-dim);
  color: var(--ink);
  padding: 12px 30px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:active {
  border-color: var(--tech-cyan);
  color: var(--tech-cyan);
}

</style>
</head>
<body>

<div class="stage-hud">
  <div class="hud-cross" style="top:20%; left:20%;"></div>
  <div class="hud-cross" style="top:20%; right:20%;"></div>
  <div class="hud-cross" style="bottom:20%; left:20%;"></div>
  <div class="hud-cross" style="bottom:20%; right:20%;"></div>
</div>

<div class="hud-tag top">M1 PROBE // CÓRTEX MOTOR PRIMÁRIO</div>
<div class="hud-tag bottom">MUSHIN SPORTS // TELEMETRIA ANALÓGICA</div>

<!-- TELA INICIAL -->
<div class="screen active" id="idle">
  <div class="brand">MUSHIN // FTT</div>
  <div class="neu-btn-wrap">
    <button class="neu-btn" id="startBtn">
      <div class="dot"></div>
      <span>INICIAR</span>
    </button>
  </div>
</div>

<!-- TELA DE TESTE -->
<div class="screen" id="run">
  <div class="timer-wrap">
    <span class="timer-label">CAPTURE_WINDOW</span>
    <div class="timer-display" id="timer">10.0</div>
  </div>
  
  <div class="counter-wrap">
    <div class="counter-display" id="counter">0</div>
    <span class="counter-label">IMPULSES</span>
  </div>
</div>

<!-- TELA DE RESULTADO -->
<div class="screen" id="result">
  <h2>FTT_COMPLETE</h2>
  <div class="final-score" id="finalCounter">0</div>
  <button class="restart-btn" id="resetBtn">NOVA CAPTURA</button>
</div>

<script>
/* 
  MUSHIN FTT ENGINE - ZERO LATENCY CORE
  Nexus Elite Build
*/

const $ = s => document.querySelector(s);
const screens = {
  idle: $('#idle'),
  run: $('#run'),
  result: $('#result')
};

let taps = 0;
let timeLeft = 10.0;
let isRunning = false;
let timerId = null;

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function startTest() {
  taps = 0;
  timeLeft = 10.0;
  isRunning = true;
  $('#counter').textContent = taps;
  $('#timer').textContent = timeLeft.toFixed(1);
  showScreen('run');

  const startTime = performance.now();
  
  timerId = setInterval(() => {
    const now = performance.now();
    const elapsed = (now - startTime) / 1000;
    timeLeft = Math.max(0, 10.0 - elapsed);
    
    $('#timer').textContent = timeLeft.toFixed(1);
    
    if (timeLeft <= 0) {
      endTest();
    }
  }, 50); // 50ms para fluidez visual sem lag de processamento
}

function endTest() {
  isRunning = false;
  clearInterval(timerId);
  $('#finalCounter').textContent = taps;
  showScreen('result');
}

function handleTap(e) {
  if (!isRunning) return;
  
  // Feedback Visual (Ripple)
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  
  createRipple(x, y);
  
  taps++;
  $('#counter').textContent = taps;
  
  // Haptic feedback se disponível
  if (navigator.vibrate) navigator.vibrate(10);
}

function createRipple(x, y) {
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = `${x}px`;
  ripple.style.top = `${y}px`;
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 400);
}

// Event Listeners - Foco em TOUCHSTART para latência zero
$('#startBtn').addEventListener('click', startTest);

$('#run').addEventListener('touchstart', (e) => {
  e.preventDefault(); // Evita zoom/scroll e reduz lag
  handleTap(e);
}, { passive: false });

// Fallback para mouse (testes)
$('#run').addEventListener('mousedown', (e) => {
  if ('ontouchstart' in window) return;
  handleTap(e);
});

$('#resetBtn').addEventListener('click', () => {
  showScreen('idle');
});

</script>
</body>
</html>
